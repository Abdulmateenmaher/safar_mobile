name: safar_mobile
description: "Safar - A premium travel app for Afghanistan"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_rating_bar: ^4.0.1
  google_maps_flutter: ^2.10.0
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  
  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.3.3
  
  # Dependency Injection
  get_it: ^8.0.3
  
  # Localization
  intl: ^0.20.2
  
  # Utils
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  share_plus: ^10.1.4
  flutter_animate: ^4.5.2
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  animations: ^2.0.11
  keyboard_dismisser: ^3.0.0
  pin_code_fields: ^9.0.1
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.4
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/lottie/
